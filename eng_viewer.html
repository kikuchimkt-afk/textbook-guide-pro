<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語 (サンシャイン) | ビューア</title>
    <meta name="description" content="中学 英語（サンシャイン 開隆堂）教科書ビューア">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/viewer.css">
</head>
<body class="viewer-body">
    <header class="viewer-header">
        <a id="back-link" href="eng_g2_toc.html" class="back-link" style="color:#fff;">
            <svg style="width:24px;height:24px;margin-right:5px;vertical-align:middle" viewBox="0 0 24 24">
                <path fill="currentColor" d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" />
            </svg>
            目次
        </a>
        <h1 id="chapter-title">英語</h1>
        <div class="header-actions">
            <div class="view-mode-switcher" id="view-mode-switcher">
                <button class="mode-tab active" data-mode="viewer" id="tab-viewer" title="ページ閲覧">
                    <span class="mode-tab-icon">📄</span><span class="mode-tab-label">ビューア</span>
                </button>
                <button class="mode-tab" data-mode="spread" id="tab-spread" title="見開き表示">
                    <span class="mode-tab-icon">📖</span><span class="mode-tab-label">見開き</span>
                </button>
            </div>
        </div>
        <div class="page-controls">
            <button id="btn-fullscreen" class="btn-fullscreen" title="全画面表示" style="display:none">
                <span id="fs-icon">📺</span>
                <span id="fs-label">全画面</span>
            </button>
            <button id="btn-prev" class="btn-icon" title="前のページ">◀</button>
            <span id="page-indicator" class="page-indicator-btn" title="ページジャンプ">p.--</span>
            <button id="btn-next" class="btn-icon" title="次のページ">▶</button>
        </div>
    </header>
    
    <main class="viewer-container" id="viewer-container">
        <section class="pane left-pane" id="image-pane">
            <div class="zoom-controls" id="zoom-controls">
                <button id="btn-zoom-out" title="縮小">−</button>
                <button id="btn-zoom-reset" title="リセット">⟳</button>
                <button id="btn-zoom-in" title="拡大">+</button>
            </div>
            <div class="image-wrapper" id="image-wrapper">
                <img id="textbook-img" src="" alt="Textbook Page" draggable="false">
                <img id="textbook-img-right" src="" alt="Textbook Page Right" draggable="false" style="display:none">
            </div>
        </section>
    </main>

    <!-- フローティングナビ (見開きモード用) -->
    <div class="floating-nav" id="floating-nav" style="display:none">
        <button class="float-btn float-prev" id="float-prev">❮</button>
        <button class="float-btn float-next" id="float-next">❯</button>
        <div class="float-page" id="float-page">p.--</div>
        <button class="float-btn float-exit-fs" id="float-exit-fs" style="display:none">✕ 全画面解除</button>
    </div>

    <!-- ページジャンプモーダル -->
    <div class="page-jump-overlay" id="page-jump-overlay">
        <div class="page-jump-modal">
            <h3>ページジャンプ</h3>
            <div class="page-jump-input-row">
                <span>p.</span>
                <input type="number" id="page-jump-input" min="1" placeholder="1〜">
                <button id="page-jump-go">移動</button>
            </div>
            <div class="page-jump-chapters" id="page-jump-chapters">
                <!-- Populated by JS -->
            </div>
            <button class="page-jump-close" id="page-jump-close">閉じる</button>
        </div>
    </div>

    <script src="js/eng_data.js"></script>
    <script src="js/eng_app.js"></script>
</body>
</html>
