<body class="viewer-body">

        <h1 id="chapter-title">中2 数学</h1>
        <div class="header-actions">

                    <span class="mode-tab-icon">📄</span><span class="mode-tab-label">ビューア</span>

    <main class="viewer-container" id="viewer-container">
        <!-- Left Pane: Textbook Image -->
        <section class="pane left-pane" id="image-pane">

    <script>
